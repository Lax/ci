name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y librime-dev libleveldb-dev

      - name: Rust toolchain
        run: rustup show

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build
        run: cargo build --release
